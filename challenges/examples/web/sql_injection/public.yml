# WEB 題目範例 - SQL Injection
title: "SQL Injection 101"
author: "admin"
difficulty: "easy"
category: "web"

owners:
  - "admin"
assignee: "admin"

description: |
  一個簡單的登入頁面，但似乎有些安全問題...

  網站: <http://localhost:8080>

  試著繞過登入機制找到 flag 吧！

challenge_type: "static_container"

points: 100

tags:
  - "web"
  - "sql-injection"
  - "authentication-bypass"

source_code_provided: false

files: []

status: "developing"
ready_for_release: false

created_at: "2026-01-18"
updated_at: "2026-01-18"

deploy_info:
  # Web 服務端口
  port: 8080

  # 部署後的 URL（比賽時填入）
  url: ""

  # 是否需要 Docker
  requires_build: true

  # 資源限制
  resources:
    memory: "256Mi"
    cpu: "100m"

hints:
  - level: 1
    cost: 0
    content: |
      SQL Injection 的經典入門。
      試試看在登入表單中輸入特殊字元，例如單引號 '

  - level: 2
    cost: 10
    content: |
      想想看 SQL 查詢的結構可能是什麼樣子。
      username=' OR 1=1 -- 這樣的輸入會發生什麼？

  - level: 3
    cost: 25
    content: |
      繞過登入後，flag 可能存在於：
      - 登入成功頁面
      - 資料庫的其他表格
      - Cookie 或 Session

learning_objectives:
  - "理解 SQL Injection 的原理"
  - "學習如何利用輸入驗證不足的漏洞"
  - "掌握基本的 SQL 語法"

required_skills:
  - "基礎 SQL 知識"
  - "HTTP 請求與回應"
  - "瀏覽器開發者工具"

recommended_tools:
  - "Burp Suite"
  - "curl"
  - "Browser DevTools"
  - "sqlmap (進階)"

references:
  - title: "SQL Injection 教學"
    url: "https://portswigger.net/web-security/sql-injection"
  - title: "OWASP SQL Injection"
    url: "https://owasp.org/www-community/attacks/SQL_Injection"

metadata:
  estimated_solve_time: "20 分鐘"
  first_blood_bonus: 30
  max_attempts: -1
