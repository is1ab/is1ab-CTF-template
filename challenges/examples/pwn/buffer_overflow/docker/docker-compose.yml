version: '3.8'

services:
  pwn-chall:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buffer_overflow_chall
    ports:
      - "9999:9999"
    restart: unless-stopped

    # 資源限制
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

    # 安全設定
    security_opt:
      - no-new-privileges:true
    read_only: true

    # 環境變數
    environment:
      - FLAG=FLAG{buff3r_0v3rfl0w_1s_34sy}

    # 健康檢查
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9999"]
      interval: 30s
      timeout: 10s
      retries: 3
