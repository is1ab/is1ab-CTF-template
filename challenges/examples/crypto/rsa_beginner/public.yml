# CRYPTO 題目範例 - RSA Beginner
title: "RSA for Beginners"
author: "admin"
difficulty: "easy"
category: "crypto"

owners:
  - "admin"
assignee: "admin"

description: |
  我用 RSA 加密了 flag，但我的公鑰有點小...

  附件包含：
  - `public_key.pem` - 公鑰
  - `encrypted_flag.txt` - 加密後的 flag

challenge_type: "static_attachment"

points: 120

tags:
  - "crypto"
  - "rsa"
  - "weak-key"

source_code_provided: false

files:
