  requires_build: false

hints:
  - level: 1
    cost: 0
    content: |
      檢查一下公鑰的大小。
      RSA 的安全性與密鑰長度有關。

  - level: 2
    cost: 10
    content: |
      n 的值很小，可以直接分解。
      試試看線上的整數分解工具，例如 factordb.com

  - level: 3
    cost: 25
    content: |
      分解 n 得到 p 和 q 後：
      1. 計算 φ(n) = (p-1)(q-1)
      2. 計算私鑰 d = e^(-1) mod φ(n)
      3. 解密: m = c^d mod n

learning_objectives:
  - "理解 RSA 加密的基本原理"
  - "學習如何攻擊弱密鑰"
  - "掌握模運算和整數分解"

required_skills:
